<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستديو زوم | Studio Zoom</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #121212;
            --border-color: #262626;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --accent-white: #ffffff;
            --accent-black: #000000;
            --whatsapp-color: #25D366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 80px; /* مساحة لزر الواتساب الثابت */
        }

        /* الهيكل والتنظيم */
        .container {
            width: 100%;
            max-width: 480px; /* حد أقصى ليناسب الهواتف بشكل مثالي */
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .page {
            display: none;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* بطاقات العروض */
        .offers-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .offer-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .offer-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .offer-details-content {
            padding: 15px;
        }

        .offer-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .offer-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .offer-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .price {
            font-size: 18px;
            font-weight: 700;
        }

        /* الأزرار */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--accent-white);
            color: var(--accent-black);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
        }

        .btn-danger {
            background-color: #dc2626;
            color: white;
        }

        /* صفحة التفاصيل */
        .back-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .gallery-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 10px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }

        .gallery-slider::-webkit-scrollbar {
            display: none;
        }

        .gallery-slider img {
            width: 100%;
            flex-shrink: 0;
            scroll-snap-align: start;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            font-size: 14px;
        }

        .detail-row span:first-child {
            color: var(--text-muted);
        }

        /* نافذة طلب رمز الإدارة (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-white);
        }

        /* لوحة الإدارة */
        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .admin-item-row {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* الأزرار الثابتة في الأسفل */
        .fixed-bottom-actions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
        }

        .whatsapp-btn {
            background-color: var(--whatsapp-color);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        footer {
            text-align: center;
            padding: 40px 0 20px;
        }

        .admin-login-trigger {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ستديو زوم</h1>
            <p>STUDIO ZOOM | توثيق اللحظات بأسلوب عصري</p>
        </header>

        <main id="home-page" class="page active">
            <div class="offers-grid" id="offers-container">
                </div>
        </main>

        <section id="details-page" class="page">
            <button class="back-btn" onclick="navigateTo('home-page')">
                <i class="fa-solid fa-arrow-right"></i> العودة للعروض
            </button>
            
            <div id="offer-details-target">
                </div>
        </section>

        <section id="admin-page" class="page">
            <button class="back-btn" onclick="navigateTo('home-page')">
                <i class="fa-solid fa-arrow-right"></i> الخروج من لوحة التحكم
            </button>
            <h2 style="margin-bottom: 20px; font-size: 22px;">لوحة إدارة الاستديو</h2>
            
            <div style="background: var(--surface-color); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 30px;">
                <h3 id="form-title" style="margin-bottom: 15px; font-size: 16px;">إضافة عرض جديد</h3>
                <input type="hidden" id="edit-index" value="">
                
                <div class="input-group">
                    <label>اسم العرض</label>
                    <input type="text" id="form-title-input" class="form-control" placeholder="مثال: عرض زفاف ملوكي">
                </div>
                <div class="input-group">
                    <label>الوصف المختصر والشامل</label>
                    <textarea id="form-desc-input" class="form-control" rows="4" placeholder="اكتب تفاصيل الخدمة والمميزات..."></textarea>
                </div>
                <div class="input-group">
                    <label>السعر</label>
                    <input type="text" id="form-price-input" class="form-control" placeholder="مثال: 350,000 د.ع">
                </div>
                <div class="input-group">
                    <label>مدة العرض</label>
                    <input type="text" id="form-duration-input" class="form-control" placeholder="مثال: يوم واحد (6 ساعات)">
                </div>
                <div class="input-group">
                    <label>تاريخ انتهاء العرض</label>
                    <input type="date" id="form-date-input" class="form-control">
                </div>
                <div class="input-group">
                    <label>صور العرض (يمكنك اختيار صورة أو أكثر)</label>
                    <input type="file" id="form-images-input" class="form-control" multiple accept="image/*">
                    <small style="color: var(--text-muted); font-size: 11px;">سيتم حفظ الصور محلياً في المتصفح.</small>
                </div>
                <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin-top: 15px;">
                    <input type="checkbox" id="form-visible-input" checked style="width: 18px; height: 18px;">
                    <label for="form-visible-input" style="margin: 0;">إظهار العرض في الصفحة الرئيسية</label>
                </div>
                
                <button class="btn btn-primary" onclick="saveOffer()" style="margin-top: 15px;">
                    <i class="fa-solid fa-floppy-disk"></i> <span id="save-btn-text">حفظ العرض</span>
                </button>
                <button class="btn btn-outline" id="cancel-edit-btn" onclick="resetForm()" style="margin-top: 10px; display: none;">إلغاء التعديل</button>
            </div>

            <h3 style="margin-bottom: 15px; font-size: 16px;">إدارة العروض المضافة</h3>
            <div id="admin-offers-list"></div>
        </section>

        <footer>
            <button class="admin-login-trigger" onclick="openAuthModal()">تعديل محتوى الموقع</button>
        </footer>
    </div>

    <div class="fixed-bottom-actions">
        <a href="https://wa.me/964XXXXXXXXXX" id="global-whatsapp" class="btn whatsapp-btn" target="_blank">
            <i class="fa-brands fa-whatsapp" style="font-size: 20px;"></i> تواصل معنا عبر واتساب
        </a>
    </div>

    <div class="modal" id="auth-modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">صلاحية التعديل</h3>
            <div class="input-group">
                <label>أدخل رمز التعديل السري</label>
                <input type="password" id="admin-password" class="form-control" style="text-align: center; letter-spacing: 5px;">
            </div>
            <button class="btn btn-primary" onclick="checkAdminPassword()">دخول</button>
            <button class="btn btn-outline" onclick="closeAuthModal()" style="margin-top: 10px; border: none;">إلغاء</button>
        </div>
    </div>

    <script>
        // بيانات تجريبية أولية في حال كانت قاعدة البيانات المحلية فارغة
        const defaultOffers = [
            {
                title: "عرض الأعراس المتكامل",
                desc: "تصوير فوتوغرافي متكامل لجلسة العروسين مع ألبوم ديجيتال فاخر، وتصوير فيديو سينمائي بدقة 4K شامل المونتاج مع لقطات درون جوية.",
                price: "450$",
                duration: "يوم الزفاف بالكامل",
                expiry: "2026-09-01",
                visible: true,
                images: ["https://images.unsplash.com/photo-1519741497674-611481863552?w=500"]
            },
            {
                title: "جلسة تصوير خارجية (Outdoor)",
                desc: "جلسة تصوير احترافية في الهواء الطلق، اختيار موقع مميز، تسليم 25 صورة معدلة بالكامل بأعلى دقة ومعالجة ألوان سينمائية.",
                price: "150$",
                duration: "3 ساعات",
                expiry: "2026-08-15",
                visible: true,
                images: ["https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=500"]
            }
        ];

        // تحميل البيانات من LocalStorage أو تعيين الافتراضية
        let offers = JSON.parse(localStorage.getItem('studio_zoom_offers')) || defaultOffers;
        if(!localStorage.getItem('studio_zoom_offers')) {
            localStorage.setItem('studio_zoom_offers', JSON.stringify(offers));
        }

        // المصفوفة المؤقتة لحفظ الصور المرفوعة كـ Base64 لغرض المحاكاة
        let uploadedImagesBase64 = [];

        // التنقل بين الصفحات بسلاسة
        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);

            // إخفاء أو إظهار زر الواتساب العام حسب الصفحة
            if(pageId === 'details-page') {
                document.getElementById('global-whatsapp').style.display = 'none';
            } else {
                document.getElementById('global-whatsapp').style.display = 'flex';
            }
        }

        // عرض العروض في الصفحة الرئيسية
        function renderHomeOffers() {
            const container = document.getElementById('offers-container');
            container.innerHTML = '';

            offers.forEach((offer, index) => {
                if(!offer.visible) return; // تخطي العروض المخفية

                const imageSrc = offer.images && offer.images.length > 0 ? offer.images[0] : 'https://via.placeholder.com/400x250?text=No+Image';

                container.innerHTML += `
                    <div class="offer-card">
                        <img src="${imageSrc}" alt="${offer.title}" loading="lazy">
                        <div class="offer-details-content">
                            <h3 class="offer-title">${offer.title}</h3>
                            <p class="offer-desc">${offer.desc}</p>
                            <div class="offer-meta">
                                <span class="price">${offer.price}</span>
                            </div>
                            <button class="btn btn-primary" onclick="showOfferDetails(${index})">عرض التفاصيل</button>
                        </div>
                    </div>
                `;
            });
        }

        // عرض صفحة تفاصيل العرض بشكل منفصل
        function showOfferDetails(index) {
            const offer = offers[index];
            const target = document.getElementById('offer-details-target');
            
            // إنشاء الـ Slider للصور
            let sliderHtml = '<div class="gallery-slider">';
            if(offer.images && offer.images.length > 0) {
                offer.images.forEach(img => {
                    sliderHtml += `<img src="${img}" alt="">`;
                });
            } else {
                sliderHtml += `<img src="https://via.placeholder.com/400x300?text=No+Image" alt="">`;
            }
            sliderHtml += '</div>';

            // رسالة الواتساب المخصصة للاستديو عند الحجز
            const whatsappMessage = encodeURIComponent(`مرحباً ستديو زوم، أرغب في حجز أو الاستفسار عن عرض: ${offer.title}`);
            const whatsappUrl = `https://wa.me/964XXXXXXXXXX?text=${whatsappMessage}`; // استبدل XXXXXXXXXX برقمك الفعلي

            target.innerHTML = `
                ${sliderHtml}
                <h2 style="font-size: 24px; margin-bottom: 10px;">${offer.title}</h2>
                <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 20px;">${offer.desc}</p>
                
                <div class="detail-row">
                    <span>السعر الإجمالي</span>
                    <span style="font-weight:bold; font-size:16px;">${offer.price}</span>
                </div>
                <div class="detail-row">
                    <span>مدة صلاحية الخدمة</span>
                    <span>${offer.duration || 'غير محددة'}</span>
                </div>
                <div class="detail-row">
                    <span>تاريخ انتهاء العرض</span>
                    <span style="color: #ff4444;">${offer.expiry || 'ينتهي قريباً'}</span>
                </div>

                <div style="margin-top: 25px; display:flex; flex-direction:column; gap:10px;">
                    <a href="${whatsappUrl}" target="_blank" class="btn whatsapp-btn">
                        <i class="fa-brands fa-whatsapp" style="font-size: 18px;"></i> احجز الآن عبر واتساب
                    </a>
                </div>
            `;

            navigateTo('details-page');
        }

        /* --- نظام التحقق وإدارة لوحة التحكم --- */
        function openAuthModal() {
            document.getElementById('auth-modal').style.display = 'flex';
            document.getElementById('admin-password').focus();
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('admin-password').value = '';
        }

        function checkAdminPassword() {
            const password = document.getElementById('admin-password').value;
            if(password === '1997') {
                closeAuthModal();
                renderAdminOffersList();
                navigateTo('admin-page');
            } else {
                alert('رمز التعديل غير صحيح.');
            }
        }

        // إدارة رفع الصور وتحويلها لروابط Base64 لتخزينها محلياً
        document.getElementById('form-images-input').addEventListener('change', function(e) {
            uploadedImagesBase64 = [];
            const files = e.target.files;
            
            for(let i=0; i<files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedImagesBase64.push(event.target.result);
                }
                reader.readAsDataURL(files[i]);
            }
        });

        // حفظ أو تحديث العرض
        function saveOffer() {
            const title = document.getElementById('form-title-input').value.trim();
            const desc = document.getElementById('form-desc-input').value.trim();
            const price = document.getElementById('form-price-input').value.trim();
            const duration = document.getElementById('form-duration-input').value.trim();
            const expiry = document.getElementById('form-date-input').value;
            const visible = document.getElementById('form-visible-input').checked;
            const editIndex = document.getElementById('edit-index').value;

            if(!title || !desc || !price) {
                alert('يرجى ملء الحقول الأساسية: الاسم، الوصف، والسعر.');
                return;
            }

            const offerData = {
                title, desc, price, duration, expiry, visible,
                images: uploadedImagesBase64.length > 0 ? uploadedImagesBase64 : (editIndex !== "" ? offers[editIndex].images : [])
            };

            if(editIndex !== "") {
                // وضع التعديل
                offers[editIndex] = offerData;
            } else {
                // وضع الإضافة الجديد
                offers.push(offerData);
            }

            localStorage.setItem('studio_zoom_offers', JSON.stringify(offers));
            alert('تم حفظ التعديلات بنجاح!');
            resetForm();
            renderAdminOffersList();
            renderHomeOffers();
        }

        // تفكيك محتويات الفورم لإعادة الاستخدام
        function resetForm() {
            document.getElementById('form-title').innerText = "إضافة عرض جديد";
            document.getElementById('save-btn-text').innerText = "حفظ العرض";
            document.getElementById('edit-index').value = "";
            document.getElementById('form-title-input').value = "";
            document.getElementById('form-desc-input').value = "";
            document.getElementById('form-price-input').value = "";
            document.getElementById('form-duration-input').value = "";
            document.getElementById('form-date-input').value = "";
            document.getElementById('form-visible-input').checked = true;
            document.getElementById('form-images-input').value = "";
            document.getElementById('cancel-edit-btn').style.display = "none";
            uploadedImagesBase64 = [];
        }

        // عرض قائمة الإدارة للتحرير والحذف والترتيب
        function renderAdminOffersList() {
            const listContainer = document.getElementById('admin-offers-list');
            listContainer.innerHTML = '';

            offers.forEach((offer, index) => {
                listContainer.innerHTML += `
                    <div class="admin-item-row">
                        <div>
                            <strong style="font-size:14px;">${offer.title}</strong>
                            <div style="font-size:11px; color:var(--text-muted)">
                                السعر: ${offer.price} | الحالة: ${offer.visible ? 'ظاهر' : 'مخفي'}
                            </div>
                        </div>
                        <div class="admin-actions">
                            <button class="btn btn-outline" style="padding:6px 10px; font-size:12px;" onclick="loadOfferToEdit(${index})"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn btn-outline" style="padding:6px 10px; font-size:12px;" onclick="moveOffer(${index}, -1)"><i class="fa-solid fa-arrow-up"></i></button>
                            <button class="btn btn-outline" style="padding:6px 10px; font-size:12px;" onclick="moveOffer(${index}, 1)"><i class="fa-solid fa-arrow-down"></i></button>
                            <button class="btn btn-danger" style="padding:6px 10px; font-size:12px;" onclick="deleteOffer(${index})"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        // تحميل بيانات العرض داخل الفورم لتعديله
        function loadOfferToEdit(index) {
            const offer = offers[index];
            document.getElementById('form-title').innerText = "تعديل العرض: " + offer.title;
            document.getElementById('save-btn-text').innerText = "تحديث العرض الحالي";
            document.getElementById('edit-index').value = index;
            
            document.getElementById('form-title-input').value = offer.title;
            document.getElementById('form-desc-input').value = offer.desc;
            document.getElementById('form-price-input').value = offer.price;
            document.getElementById('form-duration-input').value = offer.duration || '';
            document.getElementById('form-date-input').value = offer.expiry || '';
            document.getElementById('form-visible-input').checked = offer.visible;
            
            document.getElementById('cancel-edit-btn').style.display = "block";
            window.scrollTo(0, 150);
        }

        // حذف العرض
        function deleteOffer(index) {
            if(confirm('هل أنت متأكد من رغبتك في حذف هذا العرض نهائياً؟')) {
                offers.splice(index, 1);
                localStorage.setItem('studio_zoom_offers', JSON.stringify(offers));
                renderAdminOffersList();
                renderHomeOffers();
            }
        }

        // تغيير ترتيب العروض (صعوداً وهبوطاً)
        function moveOffer(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= offers.length) return; // الحماية من الخروج من الحدود
            
            // تبديل الأماكن
            const temp = offers[index];
            offers[index] = offers[targetIndex];
            offers[targetIndex] = temp;
            
            localStorage.setItem('studio_zoom_offers', JSON.stringify(offers));
            renderAdminOffersList();
            renderHomeOffers();
        }

        // التشغيل المبدئي عند تحميل الصفحة لأول مرة
        document.addEventListener("DOMContentLoaded", () => {
            renderHomeOffers();
        });
    </script>
</body>
</html>
