            CloudSync: () => <svg className="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"/></svg>,

        };

        function App() {
            // --- 1. INITIAL SYSTEM DATA ---
            const initialBookings = [
                {
                    id: 'ZM-1001',
                    groomName: 'عبد الرحمن الشمري',
                    brideName: 'نورة الخالدي',
                    date: '2026-07-07',
                    hallName: 'تغطية زفاف ملكية متكاملة (فيديو + فوتو)',
                    venue: 'قاعة الملكية الكبرى',
                    totalPrice: 2000,
                    deposit: 500,
                    remaining: 1500,
                    phone: '07701234567',
                    notes: 'كادر نسائي بالكامل، تسليم الألبوم الحراري خلال أسبوعين، طائرة درون لجلسة التصوير الخارجية',
                    status: 'مؤكد',
                    createdAt: '2026-06-01'
                },
                {
                    id: 'ZM-1002',
                    groomName: 'مصطفى العاني',
                    brideName: 'مريم الجبوري',
                    date: '2026-07-07',
                    hallName: 'جلسة تصوير داخلية (VIP)',
                    venue: 'استوديو زوم الداخلي',
                    totalPrice: 500,
                    deposit: 150,
                    remaining: 350,
                    phone: '07802223334',
                    notes: 'تعديل 30 صورة فوتوشوب سينمائي، طباعة بوستر جداري كبير ببرواز خشبي',
                    status: 'مؤكد',
                    createdAt: '2026-06-05'
                },
                {
                    id: 'ZM-1003',
                    groomName: 'خالد الهاشمي',
                    brideName: 'ريما السعدون',
                    date: '2026-07-10',
                    hallName: 'تغطية زفاف ملكية متكاملة (فيديو + فوتو)',
                    venue: 'قاعة اللؤلؤة الكريستالية',
                    totalPrice: 1500,
                    deposit: 300,
                    remaining: 1200,
                    phone: '07503334445',
                    notes: 'حجز مبدئي - بانتظار استكمال دفعة العربون المتبقية لتثبيت الكادر',
                    status: 'مبدئي',
                    createdAt: '2026-06-15'
                }
            ];

            const initialServices = [
                'تغطية زفاف ملكية متكاملة (فيديو + فوتو)',
                'تغطية حفلة خطوبة وتصوير خارجي',
                'جلسة تصوير داخلية (VIP)',
                'تغطية حفل تخرج سينمائي',
                'جلسة تصوير أطفال ومناسبات عائلية'
            ];

            // --- 2. STATE MANAGEMENT ---
            const [bookings, setBookings] = useState(() => {
                const saved = localStorage.getItem('zoom_studio_bookings');
                return saved ? JSON.parse(saved) : initialBookings;
            });

            const [services, setServices] = useState(() => {
                const saved = localStorage.getItem('zoom_studio_services');
                return saved ? JSON.parse(saved) : initialServices;
            });

            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedMonth, setSelectedMonth] = useState(6); // July
            const [selectedYear, setSelectedYear] = useState(2026);
            const [selectedDate, setSelectedDate] = useState('2026-07-07');
            const [toast, setToast] = useState(null);

            // Cloud Sync States
            const [syncCode, setSyncCode] = useState(() => {
                return localStorage.getItem('zoom_sync_code') || '';
            });
            const [isSyncing, setIsSyncing] = useState(false);
            const [lastSyncTime, setLastSyncTime] = useState(() => {
                return localStorage.getItem('zoom_last_sync') || 'غير متصل';
            });
            const [autoSync, setAutoSync] = useState(() => {
                return localStorage.getItem('zoom_auto_sync') === 'true';
            });

            // Filter states
            const [searchGroom, setSearchGroom] = useState('');
            const [searchBride, setSearchBride] = useState('');
            const [searchDate, setSearchDate] = useState('');
            const [searchService, setSearchService] = useState('');
            const [searchPhone, setSearchPhone] = useState('');

            // Modals and dialogs
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingBooking, setEditingBooking] = useState(null); 
            const [modalType, setModalType] = useState('create'); // create | edit | details | move | copy
            const [targetDateForMoveCopy, setTargetDateForMoveCopy] = useState('');
            const [confirmDeleteData, setConfirmDeleteData] = useState(null);

            const [formData, setFormData] = useState({
                id: '',
                groomName: '',
                brideName: '',
                date: '2026-07-07',
                hallName: 'تغطية زفاف ملكية متكاملة (فيديو + فوتو)',
                venue: '',
                totalPrice: '',
                deposit: '',
                remaining: '',
                phone: '',
                notes: '',
                status: 'مبدئي'
            });

            useEffect(() => {
                localStorage.setItem('zoom_studio_bookings', JSON.stringify(bookings));
            }, [bookings]);

            useEffect(() => {
                localStorage.setItem('zoom_studio_services', JSON.stringify(services));
            }, [services]);

            useEffect(() => {
                localStorage.setItem('zoom_sync_code', syncCode);
            }, [syncCode]);

            useEffect(() => {
                localStorage.setItem('zoom_auto_sync', autoSync);
            }, [autoSync]);

            // Auto-Sync Background Pull Trigger
            useEffect(() => {
                if (autoSync && syncCode) {
                    pullFromCloud(syncCode);
                    const interval = setInterval(() => {
                        pullFromCloud(syncCode);
                    }, 20000); // Sync every 20 seconds
                    return () => clearInterval(interval);
                }
            }, [autoSync, syncCode]);

            // --- 3. CONSTANTS ---
            const ARABIC_MONTH_NAMES = [
                'يناير / كانون الثاني', 'فبراير / شباط', 'مارس / آذار', 'أبريل / نيسان',
                'مايو / أيار', 'يونيو / حزيران', 'يوليو / تموز', 'أغسطس / آب',
                'سبتمبر / أيلول', 'أكتوبر / تشرين الأول', 'نوفمبر / تشرين الثاني', 'ديسمبر / كانون الأول'
            ];

            const WEEK_DAYS = ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'];

            // --- 4. UTILITIES ---
            const showNotification = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            const getBookingsCountForDate = (dateString) => {
                return bookings.filter(b => b.date === dateString && b.status !== 'ملغي').length;
            };

            const getBookingsForDate = (dateString) => {
                return bookings.filter(b => b.date === dateString);
            };

            const getDaysInMonth = (monthIndex, year) => {
                return new Date(year, monthIndex + 1, 0).getDate();
            };

            const getFirstDayOfMonthOffset = (monthIndex, year) => {
                const firstDay = new Date(year, monthIndex, 1).getDay();
                return (firstDay + 1) % 7;
            };

            // --- Cloud Synchronizer Methods ---
            const pushToCloud = async (code) => {
                const targetCode = code || syncCode;
                if (!targetCode.trim()) {
                    showNotification('يرجى تحديد رمز مزامنة صالح للاستوديو أولاً', 'error');
                    return;
                }
                setIsSyncing(true);
                try {
                    const response = await fetch(`https://kvdb.io/K7n8m9pLqRstUvwXyZ1234/zoom_bookings_${targetCode.trim()}`, {
                        method: 'POST',
                        body: JSON.stringify({ bookings, services }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    if (response.ok) {
                        const now = new Date().toLocaleTimeString('ar-EG');
                        setLastSyncTime(now);
                        localStorage.setItem('zoom_last_sync', now);
                        showNotification('تم رفع ومزامنة كافة حجوزات زوم مع السيرفر السحابي ☁️');
                    } else {
                        showNotification('فشلت المزامنة السحابية للرفع، يرجى المحاولة لاحقاً', 'error');
                    }
                } catch (error) {
                    showNotification('خطأ في الاتصال بسيرفر المزامنة السحابية', 'error');
                } finally {
                    setIsSyncing(false);
                }
            };

            const pullFromCloud = async (code) => {
                const targetCode = code || syncCode;
                if (!targetCode.trim()) {
                    showNotification('يرجى تحديد رمز مزامنة صالح للاستوديو أولاً', 'error');
                    return;
                }
                setIsSyncing(true);
                try {
                    const response = await fetch(`https://kvdb.io/K7n8m9pLqRstUvwXyZ1234/zoom_bookings_${targetCode.trim()}`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.bookings) {
                            setBookings(data.bookings);
                            if (data.services) setServices(data.services);
                            const now = new Date().toLocaleTimeString('ar-EG');
                            setLastSyncTime(now);
                            localStorage.setItem('zoom_last_sync', now);
                            showNotification('تم سحب وتزامن أحدث الحجوزات بنجاح من السحابة 📥');
                        }
                    } else if (response.status === 404) {
                        showNotification('لا توجد بيانات سحابية مسجلة بهذا الرمز بعد. سنقوم برفع بياناتك عند الحفظ التلقائي القادم.', 'info');
                        await pushToCloud(targetCode);
                    } else {
                        showNotification('فشل مزامنة جلب البيانات', 'error');
                    }
                } catch (error) {
                    showNotification('فشل الاتصال بسيرفر السحابة لتحديث البيانات', 'error');
                } finally {
                    setIsSyncing(false);
                }
            };

            // --- 5. SYSTEM HANDLERS ---
            const handleOpenNewBooking = (dateStr) => {
                const targetDate = dateStr || selectedDate;
                const currentCount = getBookingsCountForDate(targetDate);
                
                if (currentCount >= 6) {
                    showNotification('تنبيه: لا يمكن إضافة حجز جديد لهذا اليوم لأنه ممتلئ بـ 6 حجوزات.', 'error');
                    return;
                }

                setModalType('create');
                setFormData({
                    id: `ZM-${Math.floor(1000 + Math.random() * 9000)}`,
                    groomName: '',
                    brideName: '',
                    date: targetDate,
                    hallName: services[0] || 'تغطية زفاف ملكية متكاملة (فيديو + فوتو)',
                    venue: '',
                    totalPrice: '',
                    deposit: '',
                    remaining: '',
                    phone: '',
                    notes: '',
                    status: 'مبدئي'
                });
                setEditingBooking(null);
                setIsModalOpen(true);
            };

            const handleOpenEditBooking = (booking) => {
                setModalType('edit');
                setFormData({
                    ...booking,
                    totalPrice: booking.totalPrice ? booking.totalPrice.toString() : '',
                    deposit: booking.deposit ? booking.deposit.toString() : '',
                    remaining: booking.remaining ? booking.remaining.toString() : '',
                    venue: booking.venue || ''
                });
                setEditingBooking(booking);
                setIsModalOpen(true);
            };

            const handleOpenMoveBooking = (booking) => {
                setModalType('move');
                setEditingBooking(booking);
                setTargetDateForMoveCopy(booking.date);
                setIsModalOpen(true);
            };

            const handleOpenCopyBooking = (booking) => {
                setModalType('copy');
                setEditingBooking(booking);
                setTargetDateForMoveCopy(booking.date);
                setIsModalOpen(true);
            };

            const handleOpenDetails = (booking) => {
                setModalType('details');
                setFormData({ ...booking });
                setIsModalOpen(true);
            };

            // Auto calculate remaining when inputs change
            const calculateAndSetRemaining = (updates) => {
                const updatedForm = { ...formData, ...updates };
                const total = parseFloat(updatedForm.totalPrice) || 0;
                const dep = parseFloat(updatedForm.deposit) || 0;
                updatedForm.remaining = (total - dep >= 0 ? total - dep : 0).toString();
                setFormData(updatedForm);
            };

            const handleSaveBooking = (e) => {
                e.preventDefault();

                if (!formData.groomName.trim() || !formData.brideName.trim()) {
                    showNotification('يرجى كتابة أسماء العرسان بالكامل لتسجيل الحجز.', 'error');
                    return;
                }

                const cleanedBooking = {
                    ...formData,
                    totalPrice: parseFloat(formData.totalPrice) || 0,
                    deposit: parseFloat(formData.deposit) || 0,
                    remaining: parseFloat(formData.remaining) || 0,
                    createdAt: formData.createdAt || new Date().toISOString().split('T')[0]
                };

                let updatedBookings = [];
                if (modalType === 'create') {
                    if (getBookingsCountForDate(cleanedBooking.date) >= 6) {
                        showNotification('تنبيه هام: هذا اليوم ممتلئ تماماً بالتغطيات.', 'error');
                        return;
                    }
                    updatedBookings = [cleanedBooking, ...bookings];
                    setBookings(updatedBookings);
                    showNotification('تم تسجيل حجز تغطية ستوديو زوم بنجاح.');
                } else {
                    updatedBookings = bookings.map(b => b.id === editingBooking.id ? cleanedBooking : b);
                    setBookings(updatedBookings);
                    showNotification('تم تحديث بيانات حجز العميل بنجاح.');
                }

                setIsModalOpen(false);

                // Auto Trigger Cloud Sync if active
                if (syncCode.trim()) {
                    setTimeout(() => {
                        pushToCloud(syncCode);
                    }, 500);
                }
            };

            const handleConfirmMove = () => {
                if (getBookingsCountForDate(targetDateForMoveCopy) >= 6) {
                    showNotification('الجدول ممتلئ تماماً بـ 6 حجوزات في هذا التاريخ.', 'error');
                    return;
                }
                const updated = bookings.map(b => b.id === editingBooking.id ? { ...b, date: targetDateForMoveCopy } : b);
                setBookings(updated);
                showNotification(`تم نقل الحجز بنجاح إلى تاريخ: ${targetDateForMoveCopy}`);
                setSelectedDate(targetDateForMoveCopy);
                setIsModalOpen(false);

                if (syncCode.trim()) {
                    setTimeout(() => pushToCloud(syncCode), 500);
                }
            };

            const handleConfirmCopy = () => {
                if (getBookingsCountForDate(targetDateForMoveCopy) >= 6) {
                    showNotification('اليوم المستهدف ممتلئ بالفعل، لا يمكن نسخ الجلسة إليه.', 'error');
                    return;
                }
                const duplicated = {
                    ...editingBooking,
                    id: `ZM-${Math.floor(1000 + Math.random() * 9000)}`,
                    date: targetDateForMoveCopy,
                    createdAt: new Date().toISOString().split('T')[0]
                };
                const updated = [duplicated, ...bookings];
                setBookings(updated);
                showNotification(`تم نسخ الحجز بنجاح لتاريخ: ${targetDateForMoveCopy}`);
                setSelectedDate(targetDateForMoveCopy);
                setIsModalOpen(false);

                if (syncCode.trim()) {
                    setTimeout(() => pushToCloud(syncCode), 500);
                }
            };

            const executeDelete = () => {
                if (confirmDeleteData) {
                    const updated = bookings.filter(b => b.id !== confirmDeleteData.id);
                    setBookings(updated);
                    showNotification('تم حذف حجز العميل وإلغاء الاستمارة بالكامل.', 'error');
                    setConfirmDeleteData(null);
                    setIsModalOpen(false);

                    if (syncCode.trim()) {
                        setTimeout(() => pushToCloud(syncCode), 500);
                    }
                }
            };

            // Export to CSV Excel
            const handleExportCSV = () => {
                let csvContent = "\uFEFF"; 
                csvContent += "رقم الحجز,اسم العريس,اسم العروس,تاريخ الجلسة,نوع الخدمة,مكان الحفل/القاعة,السعر الإجمالي,العربون المدفوع,المبلغ المتبقي,الهاتف,الحالة,الملاحظات,تاريخ الإنشاء\n";
                bookings.forEach(b => {
                    csvContent += `${b.id},"${b.groomName}","${b.brideName}",${b.date},"${b.hallName}","${b.venue || ''}",${b.totalPrice || 0},${b.deposit},${b.remaining},"${b.phone}","${b.status}","${b.notes || ''}",${b.createdAt}\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Studio_Zoom_Bookings_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showNotification('تم تصدير ملف إكسل CSV بنجاح.');
            };

            const handleBackupJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ bookings, services }));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `Studio_Zoom_FullBackup_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                document.body.removeChild(downloadAnchor);
                showNotification('تم تنزيل النسخة الاحتياطية بنجاح.');
            };

            const handleRestoreJSON = (e) => {
                const fileReader = new FileReader();
                if (e.target.files && e.target.files[0]) {
                    fileReader.readAsText(e.target.files[0], "UTF-8");
                    fileReader.onload = (event) => {
                        try {
                            const parsed = JSON.parse(event.target.result);
                            if (parsed.bookings && parsed.services) {
                                setBookings(parsed.bookings);
                                setServices(parsed.services);
                                showNotification('تمت استعادة كافة حجوزات استوديو زوم بنجاح.');
                            } else {
                                showNotification('تنبيه: الملف غير صالح لمطابقة قاعدة بيانات الاستوديو.', 'error');
                            }
                        } catch (error) {
                            showNotification('فشل قراءة الملف المرفوع.', 'error');
                        }
                    };
                }
            };

            // --- Calc Metrics ---
            const statsBookingsByMonth = Array(12).fill(0).map((_, mIdx) => {
                return bookings.filter(b => {
                    const bDate = new Date(b.date);
                    return bDate.getMonth() === mIdx && bDate.getFullYear() === selectedYear && b.status !== 'ملغي';
                }).length;
            });

            const statsTotalDeposits = bookings.filter(b => b.status !== 'ملغي').reduce((sum, b) => sum + b.deposit, 0);
            const statsTotalRemaining = bookings.filter(b => b.status !== 'ملغي').reduce((sum, b) => sum + b.remaining, 0);
            const statsUpcoming = bookings.filter(b => {
                const todayStr = new Date().toISOString().split('T')[0];
                return b.date >= todayStr && b.status !== 'ملغي' && b.status !== 'مكتمل';
            });
            const statsCompleted = bookings.filter(b => b.status === 'مكتمل');
            const statsCanceled = bookings.filter(b => b.status === 'ملغي');

            return (
                <div className="flex flex-col min-h-screen">
                    
                    {/* --- SYSTEM TOAST --- */}
                    {toast && (
                        <div className={`fixed top-6 left-6 z-50 flex items-center gap-3 px-5 py-4 rounded-xl shadow-2xl border transform transition-all duration-300 animate-slideIn bg-slate-900/95 ${
                            toast.type === 'success' ? 'border-amber-500 text-amber-200' : 'border-rose-500 text-rose-200'
                        }`}>
                            {toast.type === 'success' ? Icons.CheckCircle() : Icons.AlertTriangle()}
                            <div>
                                <p className="font-bold text-sm text-right">إشعار استوديو زوم</p>
                                <p className="text-xs text-slate-200 mt-0.5 text-right">{toast.message}</p>
                            </div>
                        </div>
                    )}

                    {/* --- CONFIRM DELETE MODAL --- */}
                    {confirmDeleteData && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-slate-900 border border-rose-900/40 rounded-2xl max-w-sm w-full p-6 text-center shadow-2xl">
                                {Icons.AlertTriangle()}
                                <h3 className="font-bold text-base text-white">تأكيد حذف الحجز</h3>
                                <p className="text-xs text-slate-400 mt-2">
                                    هل أنت متأكد من حذف الحجز الخاص بـالعريس <strong className="text-amber-500">{confirmDeleteData.groomName}</strong> نهائياً؟
                                </p>
                                <div className="flex gap-2 justify-center mt-6">
                                    <button onClick={() => setConfirmDeleteData(null)} className="bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs px-4 py-2 rounded-xl">تراجع وإلغاء</button>
                                    <button onClick={executeDelete} className="bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs px-4 py-2 rounded-xl">نعم، احذف الحجز</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- DESKTOP HEADER (No-Print) --- */}
                    <header className="bg-slate-900/90 backdrop-blur border-b border-slate-800 sticky top-0 z-40 no-print">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-tr from-amber-500 to-yellow-600 p-3 rounded-2xl shadow-lg shadow-amber-500/10 text-slate-950">
                                    {Icons.Camera()}
                                </div>
                                <div>
                                    <div className="flex items-center gap-2">
                                        <h1 className="text-xl md:text-2xl font-black text-white">مكتب ستوديو زوم</h1>
                                        <span className="text-[10px] bg-amber-500/15 text-amber-400 px-2 py-0.5 rounded-full border border-amber-500/20 font-bold">للتصوير وتنظيم الحفلات</span>
                                    </div>
                                    <p className="text-slate-400 text-xs mt-0.5 font-light">النظام الذكي المحدث لإدارة حجوزات الجلسات، التغطيات السينمائية، والتقارير والديون</p>
                                </div>
                            </div>

                            {/* Cloud Sync Status Indicator */}
                            <div className="flex items-center gap-3 text-xs bg-slate-950/60 p-2 rounded-xl border border-slate-800">
                                <div className="flex items-center gap-2 border-l border-slate-800 pl-3">
                                    <div className={`w-2.5 h-2.5 rounded-full ${syncCode ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`}></div>
                                    <span className="text-[10px] text-slate-400">حالة السحابة:</span>
                                    <span className="font-bold text-slate-200">{syncCode ? 'متصل ومؤمن' : 'غير متصل'}</span>
                                </div>
                                {syncCode && (
                                    <button 
                                        onClick={() => pullFromCloud(syncCode)} 
                                        disabled={isSyncing}
                                        className="bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 font-bold px-2 py-1 rounded border border-amber-500/20 flex items-center gap-1 transition-all"
                                    >
                                        {isSyncing ? 'مزامنة...' : 'تحديث يدوي 🔄'}
                                    </button>
                                )}
                            </div>

                            <div className="flex items-center gap-3 bg-slate-950/60 p-2 rounded-xl border border-slate-800 text-xs">
                                <div className="text-right px-2 border-l border-slate-800">
                                    <span className="text-slate-400 block text-[10px]">حجوزات نشطة اليوم</span>
                                    <strong className="text-amber-400 font-bold text-sm">{getBookingsCountForDate('2026-07-07')} حجوزات</strong>
                                </div>
                                <div className="text-right px-2">
                                    <span className="text-slate-400 block text-[10px]">إجمالي التغطيات</span>
                                    <strong className="text-emerald-400 font-bold text-sm">{bookings.length} تغطية مسجلة</strong>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* --- DESKTOP NAVIGATION TABS (No-Print) --- */}
                    <nav className="bg-slate-900 border-b border-slate-800 py-2 sticky top-[77px] z-30 no-print shadow-md">
                        <div className="max-w-7xl mx-auto px-4 flex flex-wrap gap-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'dashboard' ? 'bg-amber-500 text-slate-950 font-bold shadow-lg shadow-amber-500/15' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                {Icons.Camera()} شاشة التحكم السنوية
                            </button>
                            <button onClick={() => setActiveTab('calendar')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'calendar' ? 'bg-amber-500 text-slate-950 font-bold shadow-lg shadow-amber-500/15' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                {Icons.Calendar()} جدول الأيام والتقويم
                            </button>
                            <button onClick={() => setActiveTab('search')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'search' ? 'bg-amber-500 text-slate-950 font-bold shadow-lg shadow-amber-500/15' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                {Icons.Search()} محرك البحث المتقدم
                            </button>
                            <button onClick={() => setActiveTab('reports')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'reports' ? 'bg-amber-500 text-slate-950 font-bold shadow-lg shadow-amber-500/15' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                {Icons.TrendingUp()} التقارير والمبيعات المالية
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all ${activeTab === 'settings' ? 'bg-amber-500 text-slate-950 font-bold shadow-lg shadow-amber-500/15' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                {Icons.Settings()} إدارة الباقات والنسخ الاحتياطي
                            </button>
                        </div>
                    </nav>

                    {/* --- MAIN DISPLAY WORKSPACES --- */}
                    <main className="max-w-7xl w-full mx-auto p-4 flex-1 flex flex-col gap-6 my-4 no-print">
                        
                        {/* TAB 1: ANNUAL DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="flex flex-col gap-6 animate-fadeIn">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                                    <div className="text-right">
                                        <h3 className="text-lg font-bold text-amber-400 flex items-center gap-2">
                                            {Icons.Video()} مكتب ستوديو زوم للإنتاج السينمائي
                                        </h3>
                                        <p className="text-xs text-slate-400 mt-1">أهلاً بك في لوحة تحكم السنوية الشاملة لعام {selectedYear}. اضغط على أي شهر لعرض جدول حجوزاته اليومية الـ 6، أو ابدأ بإضافة حجز جديد مباشرة.</p>
                                    </div>
                                    <button onClick={() => handleOpenNewBooking()} className="bg-gradient-to-r from-amber-500 to-yellow-500 hover:from-amber-600 hover:to-yellow-600 text-slate-950 font-bold text-sm px-5 py-3 rounded-xl flex items-center gap-2 shadow-lg transition-all">
                                        {Icons.Plus()} حجز تغطية جديدة
                                    </button>
                                </div>

                                {/* Metrics Row */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <div className="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex items-center justify-between">
                                        <div>
                                            <span className="text-xs text-slate-400 block font-semibold">العربونات المستلمة</span>
                                            <strong className="text-xl font-black text-emerald-400 mt-1 block">{statsTotalDeposits.toLocaleString()} $</strong>
                                        </div>
                                        <div className="bg-emerald-500/10 p-3 rounded-xl text-emerald-400">{Icons.DollarSign()}</div>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex items-center justify-between">
                                        <div>
                                            <span className="text-xs text-slate-400 block font-semibold">المبالغ المتبقية بذمة العملاء</span>
                                            <strong className="text-xl font-black text-amber-500 mt-1 block">{statsTotalRemaining.toLocaleString()} $</strong>
                                        </div>
                                        <div className="bg-amber-500/10 p-3 rounded-xl text-amber-500">{Icons.DollarSign()}</div>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex items-center justify-between">
                                        <div>
                                            <span className="text-xs text-slate-400 block font-semibold">المناسبات المجدولة القادمة</span>
                                            <strong className="text-xl font-black text-blue-400 mt-1 block">{statsUpcoming.length} مناسبة</strong>
                                        </div>
                                        <div className="bg-blue-500/10 p-3 rounded-xl text-blue-400">{Icons.Users()}</div>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-5 rounded-2xl flex items-center justify-between">
                                        <div>
                                            <span className="text-xs text-slate-400 block font-semibold">أعمال تم تسليمها بنجاح</span>
                                            <strong className="text-xl font-black text-emerald-500 mt-1 block">{statsCompleted.length} مكتملة</strong>
                                        </div>
                                        <div className="bg-emerald-500/10 p-3 rounded-xl text-emerald-400">{Icons.CheckCircle()}</div>
                                    </div>
                                </div>

                                {/* Annual Months Calendar */}
                                <div>
                                    <h2 className="text-lg font-bold text-white mb-4 flex items-center gap-2 border-r-4 border-amber-500 pr-2">تقويم المبيعات وحجوزات الأشهر لعام {selectedYear}</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        {ARABIC_MONTH_NAMES.map((mName, mIdx) => {
                                            const monthlyBookings = bookings.filter(b => {
                                                const bDate = new Date(b.date);
                                                return bDate.getMonth() === mIdx && bDate.getFullYear() === selectedYear;
                                            });
                                            const activeCount = monthlyBookings.filter(b => b.status !== 'ملغي').length;

                                            let cardStyle = 'border-slate-800 bg-slate-900 hover:border-amber-500/60';
                                            if (activeCount > 8) cardStyle = 'border-emerald-500/30 bg-emerald-950/15 hover:border-emerald-500';
                                            else if (activeCount > 4) cardStyle = 'border-amber-500/30 bg-amber-950/15 hover:border-amber-500';

                                            return (
                                                <div key={mIdx} onClick={() => { setSelectedMonth(mIdx); setActiveTab('calendar'); }} className={`border p-5 rounded-2xl flex flex-col justify-between gap-4 cursor-pointer hover:scale-[1.02] transition-all duration-300 shadow-sm ${cardStyle}`}>
                                                    <div>
                                                        <div className="flex items-center justify-between">
                                                            <h4 className="font-black text-sm text-white">{mName}</h4>
                                                            <span className="text-[10px] bg-slate-800 px-2 py-0.5 rounded-full text-slate-300 font-mono">{selectedYear}/{mIdx+1}</span>
                                                        </div>
                                                        <div className="mt-4 flex items-baseline gap-2">
                                                            <strong className="text-2xl font-black text-amber-400">{activeCount}</strong>
                                                            <span className="text-xs text-slate-400">حجوزات نشطة</span>
                                                        </div>
                                                    </div>
                                                    <div className="pt-2 border-t border-slate-800/60 flex items-center justify-between text-xs">
                                                        <span className="text-slate-400">نسبة الكثافة:</span>
                                                        <span className="font-semibold text-slate-200">{((activeCount / 30) * 100).toFixed(0)}%</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 2: DETAILED CALENDAR */}
                        {activeTab === 'calendar' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fadeIn">
                                <div className="lg:col-span-8 bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-4">
                                    <div className="flex flex-col sm:flex-row justify-between items-center gap-4 border-b border-slate-800 pb-4">
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => { if (selectedMonth === 0) { setSelectedMonth(11); setSelectedYear(selectedYear - 1); } else { setSelectedMonth(selectedMonth - 1); } }} className="p-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition-colors">{Icons.ChevronRight()}</button>
                                            <div className="text-right">
                                                <h2 className="text-lg font-black text-amber-400 leading-tight">{ARABIC_MONTH_NAMES[selectedMonth]}</h2>
                                                <span className="text-xs font-mono text-slate-400">سنة {selectedYear}</span>
                                            </div>
                                            <button onClick={() => { if (selectedMonth === 11) { setSelectedMonth(0); setSelectedYear(selectedYear + 1); } else { setSelectedMonth(selectedMonth + 1); } }} className="p-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition-colors">{Icons.ChevronLeft()}</button>
                                        </div>
                                        <div className="flex items-center gap-3 text-xs flex-wrap">
                                            <span className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-slate-950 border border-slate-800 rounded-md"></span> متاح بالكامل</span>
                                            <span className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-amber-600/30 border border-amber-500 rounded-md"></span> محجوز جزئياً</span>
                                            <span className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-rose-600/30 border border-rose-500 rounded-md"></span> ممتلئ (6 حجوزات)</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-7 gap-2 text-center text-xs font-black text-slate-400 bg-slate-950/40 py-2.5 rounded-lg border border-slate-800/40 select-none">
                                        {WEEK_DAYS.map(day => <div key={day}>{day}</div>)}
                                    </div>

                                    <div className="grid grid-cols-7 gap-2">
                                        {Array(getFirstDayOfMonthOffset(selectedMonth, selectedYear)).fill(null).map((_, i) => (
                                            <div key={`empty-${i}`} className="aspect-square bg-transparent rounded-xl pointer-events-none" />
                                        ))}

                                        {Array(getDaysInMonth(selectedMonth, selectedYear)).fill(null).map((_, dayIndex) => {
                                            const dayNum = dayIndex + 1;
                                            const dateStr = `${selectedYear}-${(selectedMonth + 1).toString().padStart(2, '0')}-${dayNum.toString().padStart(2, '0')}`;
                                            const activeCount = getBookingsCountForDate(dateStr);
                                            const isSelected = selectedDate === dateStr;

                                            let dayStyle = 'bg-slate-950 hover:bg-slate-800/80 border-slate-850 text-slate-100';
                                            if (activeCount > 0 && activeCount < 6) {
                                                dayStyle = 'bg-amber-950/20 hover:bg-amber-950/40 border-amber-500 text-amber-200';
                                            } else if (activeCount >= 6) {
                                                dayStyle = 'bg-rose-950/20 hover:bg-rose-950/40 border-rose-500 text-rose-200';
                                            }

                                            if (isSelected) {
                                                dayStyle = 'bg-amber-500 border-amber-500 text-slate-950 ring-4 ring-amber-500/15 font-bold';
                                            }

                                            return (
                                                <div key={dayNum} onClick={() => setSelectedDate(dateStr)} className={`aspect-square border rounded-xl p-2 flex flex-col justify-between cursor-pointer transition-all duration-150 shadow-sm ${dayStyle}`}>
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-xs font-black">{dayNum}</span>
                                                        {activeCount > 0 && <span className={`text-[9px] px-1 py-0.5 rounded-md font-mono ${isSelected ? 'bg-slate-950/20 text-slate-950 font-bold' : 'bg-slate-900/60 text-slate-300'}`}>{activeCount}/6</span>}
                                                    </div>
                                                    <div className="hidden sm:block">
                                                        {activeCount > 0 && <div className={`text-[9px] truncate text-center ${isSelected ? 'text-slate-950 font-black' : 'text-slate-400 font-semibold'}`}>{activeCount} أعمال</div>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Sidebar Details for Selected Day */}
                                <div className="lg:col-span-4 bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-4">
                                    <div className="border-b border-slate-800 pb-3 flex items-center justify-between">
                                        <div>
                                            <h3 className="font-bold text-sm text-white">جلسات تصوير هذا اليوم</h3>
                                            <span className="text-xs font-mono text-amber-500 font-bold">{selectedDate}</span>
                                        </div>
                                        <div className="bg-slate-800/80 px-2.5 py-1 rounded-lg text-xs font-bold font-mono">
                                            {6 - getBookingsCountForDate(selectedDate)} شواغر متبقية
                                        </div>
                                    </div>

                                    <div className="flex-1 flex flex-col gap-3 max-h-[420px] overflow-y-auto pr-1">
                                        {getBookingsForDate(selectedDate).map((b, idx) => {
                                            let badgeStyle = 'bg-amber-900/40 text-amber-400 border-amber-600/30';
                                            if (b.status === 'مؤكد') badgeStyle = 'bg-emerald-900/40 text-emerald-400 border-emerald-600/30';
                                            if (b.status === 'ملغي') badgeStyle = 'bg-rose-900/40 text-rose-400 border-rose-600/30';
                                            if (b.status === 'مكتمل') badgeStyle = 'bg-blue-900/40 text-blue-400 border-blue-600/30';

                                            return (
                                                <div key={b.id} className="bg-slate-950 border border-slate-800/80 rounded-xl p-3 flex flex-col gap-2.5 relative">
                                                    <div className="flex justify-between items-center text-xs">
                                                        <span className="font-mono text-slate-400">حجز التغطية {idx + 1} من 6</span>
                                                        <span className={`px-2 py-0.5 rounded-full font-bold border ${badgeStyle}`}>{b.status}</span>
                                                    </div>
                                                    <div>
                                                        <h4 className="font-black text-sm text-amber-400">عريس: {b.groomName}</h4>
                                                        <h5 className="font-semibold text-xs text-slate-300 mt-1">عروس: {b.brideName}</h5>
                                                        <p className="text-[11px] text-slate-400 mt-1 flex items-center gap-1">📸 {b.hallName}</p>
                                                    </div>
                                                    <div className="pt-2 mt-1 border-t border-slate-900 flex justify-between items-center gap-1 text-[11px]">
                                                        <button onClick={() => handleOpenDetails(b)} className="text-slate-300 hover:text-white hover:underline flex items-center gap-1">
                                                            {Icons.FileText()} الاستمارة
                                                        </button>
                                                        <div className="flex items-center gap-2">
                                                            <button onClick={() => handleOpenEditBooking(b)} className="text-blue-400 hover:text-blue-300">تعديل</button>
                                                            <span className="text-slate-800">|</span>
                                                            <button onClick={() => handleOpenMoveBooking(b)} className="text-amber-500 hover:text-amber-400">نقل</button>
                                                            <span className="text-slate-800">|</span>
                                                            <button onClick={() => handleOpenCopyBooking(b)} className="text-purple-400 hover:text-purple-300">نسخ</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}

                                        {Array(6 - getBookingsCountForDate(selectedDate)).fill(null).map((_, idx) => (
                                            <div key={idx} className="border border-dashed border-slate-850 rounded-xl p-4 flex flex-col items-center justify-center text-center bg-slate-950/20 py-6 animate-pulse">
                                                <p className="text-xs text-slate-500">كادر شاغر ومتاح للعمل</p>
                                                <button onClick={() => handleOpenNewBooking(selectedDate)} className="mt-2 text-xs bg-slate-800 hover:bg-slate-700 text-white font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 transition-all">
                                                    {Icons.Plus()} رصد حجز جديد
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 3: ADVANCED SEARCH */}
                        {activeTab === 'search' && (
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-6 animate-fadeIn">
                                <div>
                                    <h2 className="text-lg font-bold text-white mb-1">واجهة الفلترة والبحث المتقدم في حجوزات زوم</h2>
                                    <p className="text-xs text-slate-400">تتيح لك تصفية قاعدة البيانات بالكامل بشكل فوري ومريح بمختلف المعايير المتقاطعة.</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-5 gap-4 bg-slate-950/50 p-4 rounded-xl border border-slate-850">
                                    <input type="text" value={searchGroom} onChange={e => setSearchGroom(e.target.value)} placeholder="اسم العريس..." className="bg-slate-900 text-xs border border-slate-800 rounded-lg p-2.5 text-white outline-none focus:border-amber-500" />
                                    <input type="text" value={searchBride} onChange={e => setSearchBride(e.target.value)} placeholder="اسم العروس..." className="bg-slate-900 text-xs border border-slate-800 rounded-lg p-2.5 text-white outline-none focus:border-amber-500" />
                                    <input type="date" value={searchDate} onChange={e => setSearchDate(e.target.value)} className="bg-slate-900 text-xs border border-slate-800 rounded-lg p-2.5 text-white outline-none focus:border-amber-500" />
                                    <select value={searchService} onChange={e => setSearchService(e.target.value)} className="bg-slate-900 text-xs border border-slate-800 rounded-lg p-2.5 text-white outline-none focus:border-amber-500">
                                        <option value="">جميع الخدمات والباقات</option>
                                        {services.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                    <input type="text" value={searchPhone} onChange={e => setSearchPhone(e.target.value)} placeholder="رقم الهاتف للتواصل..." className="bg-slate-900 text-xs border border-slate-800 rounded-lg p-2.5 text-white outline-none focus:border-amber-500 font-mono" />
                                </div>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-right text-xs">
                                        <thead>
                                            <tr className="bg-slate-950 text-slate-400 font-bold border-b border-slate-850">
                                                <th className="p-3">رقم الاستمارة</th>
                                                <th className="p-3">اسم العميل (العريس/العروس)</th>
                                                <th className="p-3">تاريخ المناسبة</th>
                                                <th className="p-3">نوع الباقة</th>
                                                <th className="p-3">العربون</th>
                                                <th className="p-3">المتبقي</th>
                                                <th className="p-3">رقم الهاتف</th>
                                                <th className="p-3">حالة الاتفاقية</th>
                                                <th className="p-3 text-center">إجراءات</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-850">
                                            {bookings.filter(b => {
                                                return (
                                                    b.groomName.toLowerCase().includes(searchGroom.toLowerCase()) &&
                                                    b.brideName.toLowerCase().includes(searchBride.toLowerCase()) &&
                                                    (searchDate === '' || b.date === searchDate) &&
                                                    (searchService === '' || b.hallName === searchService) &&
                                                    b.phone.includes(searchPhone)
                                                );
                                            }).map(b => (
                                                <tr key={b.id} className="hover:bg-slate-950/60 transition-colors">
                                                    <td className="p-3 font-mono font-bold text-slate-500">{b.id}</td>
                                                    <td className="p-3">
                                                        <strong className="text-white block font-black">عريس: {b.groomName}</strong>
                                                        <span className="text-slate-400 block mt-0.5">عروس: {b.brideName}</span>
                                                    </td>
                                                    <td className="p-3 font-mono text-amber-500 font-semibold">{b.date}</td>
                                                    <td className="p-3 text-slate-300 font-semibold">{b.hallName}</td>
                                                    <td className="p-3 text-emerald-400 font-bold">{b.deposit} $</td>
                                                    <td className="p-3 text-amber-500 font-bold">{b.remaining} $</td>
                                                    <td className="p-3 font-mono text-slate-400">{b.phone || '---'}</td>
                                                    <td className="p-3"><span className="bg-emerald-950/40 text-emerald-400 px-2 py-0.5 border border-emerald-900/30 rounded-full font-bold">{b.status}</span></td>
                                                    <td className="p-3">
                                                        <div className="flex items-center justify-center gap-1.5">
                                                            <button onClick={() => handleOpenDetails(b)} className="bg-slate-850 hover:bg-slate-800 text-white font-bold px-2.5 py-1 rounded-md">عرض</button>
                                                            <button onClick={() => handleOpenEditBooking(b)} className="bg-blue-950/40 hover:bg-blue-850/60 text-blue-400 px-2.5 py-1 rounded-md">تعديل</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TAB 4: REPORTS */}
                        {activeTab === 'reports' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fadeIn">
                                <div className="lg:col-span-8 bg-slate-900 border border-slate-800 rounded-2xl p-6">
                                    <div className="flex justify-between items-center border-b border-slate-800 pb-3 mb-4">
                                        <h3 className="font-bold text-white text-base">تقرير الكثافة السنوية والمبيعات الشهرية لـ زوم</h3>
                                        <button onClick={() => window.print()} className="bg-slate-800 p-2.5 rounded-xl border border-slate-700 text-white">{Icons.Printer()}</button>
                                    </div>
                                    <div className="flex flex-col gap-3.5">
                                        {ARABIC_MONTH_NAMES.map((mName, mIdx) => {
                                            const count = statsBookingsByMonth[mIdx];
                                            const percent = count > 0 ? Math.min(100, (count / 12) * 100) : 0;
                                            return (
                                                <div key={mName} className="flex items-center gap-4 text-xs">
                                                    <span className="w-28 text-slate-300 font-semibold">{mName}</span>
                                                    <div className="flex-1 bg-slate-950 h-5 rounded-md overflow-hidden relative border border-slate-800">
                                                        <div className="h-full bg-gradient-to-r from-amber-600 to-amber-400 rounded-md transition-all duration-1000" style={{ width: `${percent || 1}%` }} />
                                                        <span className="absolute right-2 top-0.5 text-[10px] font-bold text-slate-200">{count} مناسبات</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="lg:col-span-4 bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-4">
                                    <h3 className="font-bold text-white text-base border-b border-slate-800 pb-3">الخلاصة المالية والمستحقات</h3>
                                    <div className="bg-slate-950 p-4 rounded-xl border border-slate-850">
                                        <span className="text-[10px] text-slate-400 block font-bold">القيمة الكلية لعقود الاتفاقيات</span>
                                        <strong className="text-xl font-black text-white">{(statsTotalDeposits + statsTotalRemaining).toLocaleString()} $</strong>
                                    </div>
                                    <div className="bg-emerald-950/20 p-4 rounded-xl border border-emerald-900/40">
                                        <span className="text-[10px] text-emerald-400 block font-bold">العربونات المستلمة خزينة نقدية</span>
                                        <strong className="text-xl font-black text-emerald-400">{statsTotalDeposits.toLocaleString()} $</strong>
                                    </div>
                                    <div className="bg-amber-950/20 p-4 rounded-xl border border-amber-900/40">
                                        <span className="text-[10px] text-amber-400 block font-bold">المتبقي المطلوب للتحصيل</span>
                                        <strong className="text-xl font-black text-amber-500">{statsTotalRemaining.toLocaleString()} $</strong>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 5: SERVICES & BACKUP */}
                        {activeTab === 'settings' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-fadeIn">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                                    <h3 className="font-bold text-white text-base border-b border-slate-800 pb-3 mb-4">إدارة خدمات وباقات استوديو زوم</h3>
                                    <div className="flex flex-col gap-3">
                                        {services.map((s, i) => (
                                            <div key={i} className="flex items-center gap-2 bg-slate-950 p-2.5 rounded-xl border border-slate-850">
                                                <input type="text" value={s} onChange={e => { const updated = [...services]; updated[i] = e.target.value; setServices(updated); }} className="bg-transparent border-none text-xs text-slate-200 focus:outline-none flex-1 font-bold" />
                                                <button onClick={() => { if(confirm('هل تريد حذف هذه الباقة؟')){ setServices(services.filter((_, idx) => idx !== i)); } }} className="text-rose-500 hover:text-rose-400 p-1">{Icons.Trash()}</button>
                                            </div>
                                        ))}
                                        <button onClick={() => setServices([...services, 'باقة تصوير وسيناريو جديدة'])} className="bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs py-2 px-4 rounded-xl flex items-center gap-1.5 self-start mt-2">
                                            {Icons.Plus()} إضافة باقة / خدمة جديدة
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col gap-4">
                                    {/* Cloud Sync Settings Card */}
                                    <div className="border border-amber-500/20 bg-amber-500/5 p-4 rounded-xl mb-4 flex flex-col gap-3">
                                        <div className="flex items-center gap-2 text-amber-400">
                                            <svg className="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"/></svg>
                                            <h4 className="font-bold text-sm">المزامنة السحابية المشتركة (تحديث مباشر بين الأجهزة)</h4>
                                        </div>
                                        <p className="text-[11px] text-slate-300 leading-relaxed">
                                            شارك الحجوزات مع الأجهزة والموظفين الآخرين فورياً! اختر رمزاً سرياً خاصاً بالاستوديو واكتب نفس الرمز في جهاز الموظف الثاني لمشاركة قاعدة البيانات فوراً.
                                        </p>
                                        <div className="flex gap-2">
                                            <input 
                                                type="text" 
                                                value={syncCode} 
                                                onChange={e => setSyncCode(e.target.value)} 
                                                placeholder="أدخل رمز الاستوديو الخاص بك (مثلاً: zoom_baghdad)" 
                                                className="bg-slate-950 border border-slate-800 p-2 rounded-lg text-xs text-white focus:outline-none focus:border-amber-500 flex-1 font-bold" 
                                            />
                                            <button 
                                                onClick={() => {
                                                    showNotification('تم تحديث رمز المزامنة السحابية');
                                                }} 
                                                className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs px-4 py-2 rounded-lg"
                                            >
                                                تفعيل الحفظ
                                            </button>
                                        </div>

                                        <div className="flex items-center justify-between text-xs mt-2 text-slate-400 bg-slate-950/80 p-2.5 rounded-lg border border-slate-900">
                                            <label className="flex items-center gap-2 cursor-pointer font-bold select-none">
                                                <input 
                                                    type="checkbox" 
                                                    checked={autoSync} 
                                                    onChange={(e) => {
                                                        setAutoSync(e.target.checked);
                                                        showNotification(e.target.checked ? 'تم تفعيل المزامنة التلقائية' : 'تم إيقاف المزامنة التلقائية');
                                                    }}
                                                    className="w-4 h-4 rounded text-amber-500 bg-slate-900 border-slate-800" 
                                                />
                                                مزامنة تلقائية في الخلفية
                                            </label>
                                            <div className="flex items-center gap-1.5">
                                                <span>آخر تحديث سحابي:</span>
                                                <span className="font-bold text-amber-400 font-mono">{lastSyncTime}</span>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-2 mt-1">
                                            <button 
                                                onClick={() => pushToCloud(syncCode)} 
                                                disabled={isSyncing}
                                                className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2 rounded-lg transition-all"
                                            >
                                                {isSyncing ? 'جاري الرفع...' : '📤 رفع الحجوزات الحالية للإنترنت'}
                                            </button>
                                            <button 
                                                onClick={() => pullFromCloud(syncCode)} 
                                                disabled={isSyncing}
                                                className="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 rounded-lg transition-all"
                                            >
                                                {isSyncing ? 'جاري السحب...' : '📥 جلب الحجوزات من الإنترنت'}
                                            </button>
                                        </div>
                                    </div>

                                    <h3 className="font-bold text-white text-base border-b border-slate-800 pb-3">إجراءات النسخ الاحتياطي والأرشفة الذاتية</h3>
                                    <p className="text-xs text-slate-400 leading-relaxed">يقوم النظام بحفظ جميع حجوزات زوم وتغييرات الديون تلقائياً في ذاكرة المتصفح الفعالة على جهازك. يوصى دوماً بتصدير نسخة من قاعدة البيانات كملف خارجي لضمان الأمان الأبدي وحمايتها من المسح.</p>
                                    
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                                        <button onClick={handleBackupJSON} className="bg-amber-900/15 hover:bg-amber-900/30 border border-amber-500 text-amber-200 font-bold text-xs p-4 rounded-xl flex flex-col items-center justify-center gap-2 transition-all shadow">
                                            {Icons.Download()}
                                            <span>تصدير نسخة احتياطية (JSON)</span>
                                        </button>

                                        <div className="relative border border-dashed border-slate-700 hover:border-amber-500 rounded-xl p-4 flex flex-col items-center justify-center gap-2 bg-slate-950/20 cursor-pointer">
                                            <input type="file" accept=".json" onChange={handleRestoreJSON} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full" />
                                            {Icons.Upload()}
                                            <span className="text-xs font-bold text-slate-300">استعادة نسخة JSON</span>
                                        </div>
                                    </div>

                                    <div className="mt-4 pt-4 border-t border-slate-800/60">
                                        <button onClick={handleExportCSV} className="bg-slate-950 hover:bg-slate-800 text-slate-300 text-xs py-2.5 px-4 rounded-xl border border-slate-800 w-full flex items-center justify-center gap-2 font-bold transition-all">
                                            {Icons.Download()} تصدير جدول مبيعات الاستوديو إلى Excel CSV
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* --- MASTER DIALOG / MODALS --- */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/75 backdrop-blur-sm z-50 flex items-center justify-center p-4 no-print">
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-xl w-full overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                                <div className="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center">
                                    <h3 className="font-bold text-sm text-amber-500 flex items-center gap-2">
                                        {Icons.Camera()}
                                        {modalType === 'create' && 'رصد حجز اتفاقية جديدة'}
                                        {modalType === 'edit' && 'تعديل استمارة الحجز'}
                                        {modalType === 'details' && 'تفاصيل حجز عرسان زوم'}
                                        {modalType === 'move' && 'نقل وتعديل تاريخ الحجز'}
                                        {modalType === 'copy' && 'تكرار ونسخ حجز التغطية'}
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-white font-black text-xl">×</button>
                                </div>

                                <div className="p-6 overflow-y-auto flex-1 flex flex-col gap-4 text-xs">
                                    
                                    {/* Move or Copy Forms */}
                                    {(modalType === 'move' || modalType === 'copy') && (
                                        <div className="flex flex-col gap-4">
                                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-850">
                                                <p className="font-bold text-slate-200">الاستمارة النشطة المحددة:</p>
                                                <p className="mt-1">العريس: <strong className="text-amber-500">{editingBooking.groomName}</strong></p>
                                                <p>العروس: <strong className="text-slate-300">{editingBooking.brideName}</strong></p>
                                            </div>
                                            <div>
                                                <label className="block font-bold text-slate-300 mb-2">اختر التاريخ المستهدف:</label>
                                                <input type="date" value={targetDateForMoveCopy} onChange={e => setTargetDateForMoveCopy(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none text-xs" />
                                            </div>
                                            <div className="flex justify-end gap-2 mt-4">
                                                <button onClick={() => setIsModalOpen(false)} className="bg-slate-800 text-white font-bold px-4 py-2 rounded-xl">إلغاء</button>
                                                {modalType === 'move' ? (
                                                    <button onClick={handleConfirmMove} className="bg-amber-500 text-slate-950 font-bold px-5 py-2 rounded-xl flex items-center gap-1">{Icons.ArrowLeftRight()} نقل الحجز الآن</button>
                                                ) : (
                                                    <button onClick={handleConfirmCopy} className="bg-purple-600 text-white font-bold px-5 py-2 rounded-xl flex items-center gap-1">{Icons.Copy()} تكرار الحجز بالكامل</button>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* View Details */}
                                    {modalType === 'details' && (
                                        <div className="flex flex-col gap-4 text-slate-200">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="bg-slate-950 p-3 rounded-xl">
                                                    <span className="text-[10px] text-slate-400 block font-bold">اسم العريس كاملاً</span>
                                                    <strong className="text-sm block mt-1">{formData.groomName}</strong>
                                                </div>
                                                <div className="bg-slate-950 p-3 rounded-xl">
                                                    <span className="text-[10px] text-slate-400 block font-bold">اسم العروس كاملاً</span>
                                                    <strong className="text-sm block mt-1">{formData.brideName}</strong>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="bg-slate-950 p-3 rounded-xl">
                                                    <span className="text-[10px] text-slate-400 block font-bold">تاريخ المناسبة</span>
                                                    <strong className="text-sm text-amber-500 block mt-1">{formData.date}</strong>
                                                </div>
                                                <div className="bg-slate-950 p-3 rounded-xl">
                                                    <span className="text-[10px] text-slate-400 block font-bold">باقة الخدمة</span>
                                                    <strong className="text-sm block mt-1">{formData.hallName}</strong>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="bg-slate-950 p-3 rounded-xl col-span-2">
                                                    <span className="text-[10px] text-slate-400 block font-bold">مكان الحفل / القاعة</span>
                                                    <strong className="text-sm block mt-1">{formData.venue || 'غير محدد'}</strong>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-4 gap-3">
                                                <div className="bg-slate-950 p-3 rounded-xl">
                                                    <span className="text-[10px] text-slate-400 block font-bold">السعر الكلي</span>
                                                    <strong className="text-white block mt-1">{formData.totalPrice || 0} $</strong>
                                                </div>
                                                <div className="bg-slate-950 p-3 rounded-xl">
                                                    <span className="text-[10px] text-slate-400 block font-bold">العربون</span>
                                                    <strong className="text-emerald-400 block mt-1">{formData.deposit} $</strong>
                                                </div>
                                                <div className="bg-slate-950 p-3 rounded-xl">
                                                    <span className="text-[10px] text-slate-400 block font-bold">المتبقي</span>
                                                    <strong className="text-amber-500 block mt-1">{formData.remaining} $</strong>
                                                </div>
                                                <div className="bg-slate-950 p-3 rounded-xl">
                                                    <span className="text-[10px] text-slate-400 block font-bold">الحالة</span>
                                                    <strong className="text-white block mt-1">{formData.status}</strong>
