                                                </div>
                                            </div>
                                            <div className="bg-slate-950 p-3 rounded-xl">
                                                <span className="text-[10px] text-slate-400 block font-bold">رقم الهاتف للتنسيق</span>
                                                <strong className="block mt-1 font-mono">{formData.phone || '---'}</strong>
                                            </div>
                                            <div className="bg-slate-950 p-3 rounded-xl">
                                                <span className="text-[10px] text-slate-400 block font-bold">التوجيهات والملاحظات</span>
                                                <p className="mt-1 leading-relaxed text-slate-300">{formData.notes || 'لا توجد ملاحظات تفصيلية مسجلة.'}</p>
                                            </div>
                                            <div className="flex justify-between items-center mt-4">
                                                <button onClick={() => setConfirmDeleteData(formData)} className="bg-rose-950/20 text-rose-400 border border-rose-900/60 font-bold px-4 py-2 rounded-xl">حذف الحجز نهائياً</button>
                                                <button onClick={() => handleOpenEditBooking(formData)} className="bg-amber-500 text-slate-950 font-bold px-5 py-2 rounded-xl">تعديل الاستمارة</button>
                                            </div>
                                        </div>
                                    )}

                                    {/* Create or Edit Form */}
                                    {(modalType === 'create' || modalType === 'edit') && (
                                        <form onSubmit={handleSaveBooking} className="flex flex-col gap-4">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block font-semibold text-slate-400 mb-1">اسم العريس كاملاً:</label>
                                                    <input type="text" value={formData.groomName} onChange={e => setFormData({ ...formData, groomName: e.target.value })} className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none" required />
                                                </div>
                                                <div>
                                                    <label className="block font-semibold text-slate-400 mb-1">اسم العروس كاملاً:</label>
                                                    <input type="text" value={formData.brideName} onChange={e => setFormData({ ...formData, brideName: e.target.value })} className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none" required />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block font-semibold text-slate-400 mb-1">تاريخ الحجز المعتمد:</label>
                                                    <input type="date" value={formData.date} onChange={e => setFormData({ ...formData, date: e.target.value })} className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none" required />
                                                </div>
                                                <div>
                                                    <label className="block font-semibold text-slate-400 mb-1">باقة تصوير زوم المحددة:</label>
                                                    <select value={formData.hallName} onChange={e => setFormData({ ...formData, hallName: e.target.value })} className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none">
                                                        {services.map(s => <option key={s} value={s}>{s}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="col-span-2">
                                                    <label className="block font-semibold text-slate-400 mb-1">مكان الحفل / القاعة (جديد ✏️):</label>
                                                    <input type="text" value={formData.venue} onChange={e => setFormData({ ...formData, venue: e.target.value })} placeholder="مثال: قاعة كوين الملكية" className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none" />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-4 gap-4">
                                                <div>
                                                    <label className="block font-semibold text-slate-400 mb-1">السعر الإجمالي ($):</label>
                                                    <input type="number" value={formData.totalPrice} onChange={e => calculateAndSetRemaining({ totalPrice: e.target.value })} className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none font-bold text-amber-400" />
                                                </div>
                                                <div>
                                                    <label className="block font-semibold text-slate-400 mb-1">العربون ($):</label>
                                                    <input type="number" value={formData.deposit} onChange={e => calculateAndSetRemaining({ deposit: e.target.value })} className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none font-bold text-emerald-400" />
                                                </div>
                                                <div>
                                                    <label className="block font-semibold text-slate-400 mb-1">المتبقي ($):</label>
                                                    <input type="number" value={formData.remaining} disabled className="w-full bg-slate-900 border border-slate-800 p-2.5 text-slate-400 rounded-xl outline-none font-bold cursor-not-allowed" />
                                                </div>
                                                <div>
                                                    <label className="block font-semibold text-slate-400 mb-1">حالة الاتفاقية:</label>
                                                    <select value={formData.status} onChange={e => setFormData({ ...formData, status: e.target.value })} className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none">
                                                        <option value="مبدئي">مبدئي (تحت المراجعة)</option>
                                                        <option value="مؤكد">مؤكد (مع عربون)</option>
                                                        <option value="ملغي">ملغي (طلب إلغاء)</option>
                                                        <option value="مكتمل">مكتمل (تم التسليم)</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block font-semibold text-slate-400 mb-1">رقم هاتف الاتصال السريع:</label>
                                                <input type="text" value={formData.phone} onChange={e => setFormData({ ...formData, phone: e.target.value })} className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none font-mono" />
                                            </div>
                                            <div>
                                                <label className="block font-semibold text-slate-400 mb-1">الملاحظات وطلبات الألبومات والديكور:</label>
                                                <textarea value={formData.notes} onChange={e => setFormData({ ...formData, notes: e.target.value })} rows="3" className="w-full bg-slate-950 border border-slate-800 p-2.5 text-white rounded-xl focus:border-amber-500 outline-none"></textarea>
                                            </div>
                                            <div className="flex justify-end gap-2 mt-4">
                                                <button type="button" onClick={() => setIsModalOpen(false)} className="bg-slate-800 text-white font-bold px-4 py-2 rounded-xl">إلغاء</button>
                                                <button type="submit" className="bg-gradient-to-r from-amber-500 to-yellow-500 text-slate-950 font-bold px-6 py-2 rounded-xl">حفظ البيانات</button>
                                            </div>
                                        </form>
                                    )}

                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- FOOTER STATUS BAR (No-Print) --- */}
                    <footer className="bg-slate-900 border-t border-slate-800 text-slate-500 text-xs py-3.5 text-center fixed bottom-0 left-0 right-0 z-40 no-print">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-2">
                            <span>مكتب ستوديو زوم لخدمات التصوير وإنتاج الأفلام والتوثيق الأكاديمي © {selectedYear}</span>
                            <span className="flex items-center gap-1 text-slate-400 font-semibold">
                                <span className="w-2.5 h-2.5 rounded-full bg-amber-500 animate-ping inline-block"></span>
                                أرشفة مستمرة نشطة وتوافق تام مع الهواتف والأجهزة
                            </span>
                        </div>
                    </footer>

                </div>
            );
        }

        // Initialize React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
